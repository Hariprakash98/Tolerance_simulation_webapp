<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tolerance Simulation Request Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
    <button class="top-btn reset-btn">Reset</button>

    <h1>Internal Tolerance Analysis - Request Form</h1>

    <div class="top-actions">
        <button class="top-btn">Home</button>
        <button class="top-btn">Convert to PDF</button>
        <button class="top-btn">Convert to PPT</button>
    </div>
</div>

<div class="main-container">

    <div class="column labels-column">
        <div class="section-title">Parameters</div>
        <div class="sub-title">Project Information</div>

        <div class="field-label">OEM Name</div>
        <div class="field-label">Car Model Name</div>
        <div class="field-label">Requester</div>
        <div class="field-label">Phase of the Project</div>
        <div class="field-label">Target of the Study</div>
    </div>

    <div class="column input-column">

        <div class="section-title">Input</div>
        <div class="spacer"></div>

        <select id="oemName" class="input-box">
            <option value="">Select OEM</option>
            <option>VW</option>
            <option>SEAT</option>
            <option>SKODA</option>
            <option>BMW</option>
            <option>AUDI</option>
            <option>MERCEDES</option>
            <option>VOLVO</option>
            <option>FORD</option>
        </select>

        <input type="text" class="input-box" placeholder="Enter car model">

        <input type="text" class="input-box" placeholder="Enter requester name">

        <select class="input-box">
            <option>Select Phase</option>
            <option>RFQ</option>
            <option>Concept</option>
            <option>Detailing</option>
            <option>Qualification</option>
        </select>

        <select id="targetStudy" class="input-box">
            <option value="">Select Target</option>
            <option value="outer">Outer Geometry</option>
            <option value="internal">Internal Tolerance</option>
            <option value="stackup">Mechanical Stack-up</option>
            <option value="rootcause">Root Cause Analysis</option>
        </select>

    </div>

    <div class="column remarks-column">

        <div class="section-title">Remarks / Hints</div>
        <div class="spacer"></div>

        <input type="text" class="remarks-box">
        <input type="text" class="remarks-box">
        <input type="text" class="remarks-box">
        <input type="text" class="remarks-box">
        <input type="text" class="remarks-box">

    </div>

</div>

<div id="dynamicContent"></div>

<script src="script.js"></script>

</body>
</html>
